<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DevClub - Gerador de IA</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet"
    >
</head>
<body>
    <main>
        <h1>
            CSS Gerador <span>com IA</span> ⚡️
        </h1>

        <p>
            Descreva o que você imagina e veja a mágica acontecer.
        </p>

        <textarea
            class="caixa-texto"
            rows="3"
            placeholder="Ex: Bola azul pingando"
        ></textarea>

        <button class="botao-gerar">
            Gerar Código ⚡️
        </button>

        <section>
            <h2>Código</h2>
            <p class="bloco-codigo"></p>
        </section>

        <section>
            <h2>Preview</h2>
            <iframe class="resultado-codigo"></iframe>
        </section>
    </main>

    <script src="scripts.js"></script>
</body>
</html>
